<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toboolist</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="../img-toboolist/logo copia.png" type="img/icon">
</head>
<body>
    <header>
      <div class="firts-header-section bg-white">
          <img class="logo" src="../img-toboolist/logo copia.png" alt="boolean-logo">
          <h1>Toboolist</h1>
        </div>
        <div class="second-header-section bg-white">
            <div class="add task">
              Add Task
            </div>
            <div class="add section">
              Add Section
            </div>
        </div>
    </header>

    <main class="bg-white">
       <section>
          <h3><span class="arrowhead">&#129171;</span> New Task</h3>
          <ul>
              <li><span class="green-check">&#10004;</span> Quarterly newsletter <span class="bg-lightblue container">Editorial</span></li>
          </ul>
       </section>
       <section>
        <h3><span class="arrowhead">&#129171;</span> New Task</h3>
        <ul>
            <li><span class="green-check">&#10004;</span> Recruiting blog post <span class="bg-lightblue container">Editorial</span></li>
            <li><span class="green-check">&#10004;</span> Mobile app launch <span class="bg-purple container">Q1 Goals</span></li>
            <li><span class="green-check">&#10004;</span> Interwiew John H. <span class="bg-lightgreen container">Recruiting</span></li>
            <li><span class="green-check">&#10004;</span> Summit update to mobile st <span class="bg-orange container">Mobile</span></li>
        </ul>
       </section>
    </main>
</body>
</html>
